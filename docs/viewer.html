<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Просмотр документации Chatis</title>
		<style>
			:root {
				color-scheme: light;
				--bg: #f7f8fb;
				--panel: #ffffff;
				--text: #202632;
				--muted: #667085;
				--line: #d9dee8;
				--code: #101828;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font: 15px/1.6 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			}

			a {
				color: #2563eb;
			}

			.shell {
				width: min(1040px, calc(100% - 32px));
				margin: 0 auto;
				padding: 22px 0 44px;
			}

			.docs-nav {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 16px;
				margin-bottom: 18px;
				border: 1px solid var(--line);
				border-radius: 8px;
				background: var(--panel);
				padding: 10px 12px;
			}

			.docs-nav strong {
				font-size: 14px;
			}

			.docs-links {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
			}

			.docs-links a {
				min-height: 36px;
				display: inline-flex;
				align-items: center;
				border: 1px solid var(--line);
				border-radius: 6px;
				padding: 0 12px;
				background: var(--panel);
				color: var(--text);
				text-decoration: none;
				font-size: 14px;
			}

			.document {
				border: 1px solid var(--line);
				border-radius: 8px;
				background: var(--panel);
				padding: 28px;
			}

			.document > *:first-child {
				margin-top: 0;
			}

			.document > *:last-child {
				margin-bottom: 0;
			}

			h1 {
				font-size: 30px;
				line-height: 1.15;
				letter-spacing: 0;
			}

			h2 {
				margin-top: 30px;
				padding-top: 18px;
				border-top: 1px solid var(--line);
				font-size: 21px;
			}

			h3 {
				margin-top: 22px;
				font-size: 17px;
			}

			p,
			ul,
			ol,
			table,
			pre {
				margin: 12px 0;
			}

			ul,
			ol {
				padding-left: 24px;
			}

			li {
				margin: 4px 0;
			}

			code,
			pre {
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
			}

			code {
				color: #111827;
				background: #eef1f6;
				border-radius: 4px;
				padding: 2px 5px;
			}

			pre {
				overflow-x: auto;
				background: var(--code);
				color: #f8fafc;
				border-radius: 6px;
				padding: 14px;
				font-size: 13px;
				line-height: 1.45;
			}

			pre code {
				background: transparent;
				color: inherit;
				padding: 0;
			}

			table {
				width: 100%;
				border-collapse: collapse;
				font-size: 14px;
			}

			th,
			td {
				padding: 8px 10px;
				border: 1px solid var(--line);
				text-align: left;
				vertical-align: top;
			}

			th {
				background: #f8fafc;
				color: var(--muted);
				font-weight: 600;
			}

			blockquote {
				margin: 12px 0;
				border-left: 3px solid var(--line);
				padding-left: 12px;
				color: var(--muted);
			}

			.error {
				color: #b42318;
			}

			@media (max-width: 760px) {
				.docs-nav {
					display: grid;
				}

				.document {
					padding: 18px;
				}
			}
		</style>
		<link rel="stylesheet" href="./assets/docs.css" />
	</head>
	<body>
		<main class="shell">
			<nav class="docs-nav" aria-label="Навигация по документации">
				<strong>Chatis Docs</strong>
				<div class="docs-links">
					<a href="./index.html">Главная</a>
					<a href="./api/openapi.html">REST</a>
					<a href="./api/asyncapi.html">WebSocket</a>
				</div>
			</nav>
			<article class="document" id="document">
				<p>Загрузка...</p>
			</article>
		</main>

		<script>
			const params = new URLSearchParams(window.location.search)
			const docPath = params.get('doc') || 'product-backlog.md'
			const container = document.getElementById('document')

			const allowedPrefixes = [
				'api/',
				'contracts/',
				'github/',
				'process/',
				'sprints/'
			]

			const isAllowedPath = (value) =>
				value.endsWith('.md') &&
				!value.startsWith('/') &&
				!value.includes('..') &&
				(value === 'product-backlog.md' ||
					allowedPrefixes.some((prefix) => value.startsWith(prefix)))

			const escapeHtml = (value) =>
				String(value)
					.replaceAll('&', '&amp;')
					.replaceAll('<', '&lt;')
					.replaceAll('>', '&gt;')
					.replaceAll('"', '&quot;')
					.replaceAll("'", '&#039;')

			const markdownHref = (href) => {
				if (href.endsWith('.md') && isAllowedPath(href)) {
					return `./viewer.html?doc=${encodeURIComponent(href)}`
				}

				return href
			}

			const inline = (value) =>
				escapeHtml(value)
					.replace(/`([^`]+)`/g, '<code>$1</code>')
					.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
					.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_match, label, href) => {
						const safeHref = escapeHtml(markdownHref(href))
						return `<a href="${safeHref}">${label}</a>`
					})

			const isTableSeparator = (line) =>
				/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line)

			const splitTableRow = (line) =>
				line
					.trim()
					.replace(/^\|/, '')
					.replace(/\|$/, '')
					.split('|')
					.map((cell) => cell.trim())

			const renderTable = (lines, start) => {
				const headers = splitTableRow(lines[start])
				const rows = []
				let cursor = start + 2

				while (cursor < lines.length && lines[cursor].includes('|') && lines[cursor].trim()) {
					rows.push(splitTableRow(lines[cursor]))
					cursor += 1
				}

				const head = headers.map((cell) => `<th>${inline(cell)}</th>`).join('')
				const body = rows
					.map((row) => `<tr>${row.map((cell) => `<td>${inline(cell)}</td>`).join('')}</tr>`)
					.join('')

				return {
					html: `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`,
					next: cursor
				}
			}

			const renderMarkdown = (source) => {
				const lines = source.replace(/\r\n/g, '\n').split('\n')
				const html = []
				let cursor = 0

				while (cursor < lines.length) {
					const line = lines[cursor]

					if (!line.trim()) {
						cursor += 1
						continue
					}

					if (line.startsWith('```')) {
						const code = []
						cursor += 1
						while (cursor < lines.length && !lines[cursor].startsWith('```')) {
							code.push(lines[cursor])
							cursor += 1
						}
						cursor += 1
						html.push(`<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`)
						continue
					}

					if (line.includes('|') && lines[cursor + 1] && isTableSeparator(lines[cursor + 1])) {
						const table = renderTable(lines, cursor)
						html.push(table.html)
						cursor = table.next
						continue
					}

					const heading = /^(#{1,4})\s+(.+)$/.exec(line)
					if (heading) {
						const level = heading[1].length
						html.push(`<h${level}>${inline(heading[2])}</h${level}>`)
						cursor += 1
						continue
					}

					if (/^\s*[-*]\s+/.test(line)) {
						const items = []
						while (cursor < lines.length && /^\s*[-*]\s+/.test(lines[cursor])) {
							items.push(lines[cursor].replace(/^\s*[-*]\s+/, ''))
							cursor += 1
						}
						html.push(`<ul>${items.map((item) => `<li>${inline(item)}</li>`).join('')}</ul>`)
						continue
					}

					if (/^\s*\d+\.\s+/.test(line)) {
						const items = []
						while (cursor < lines.length && /^\s*\d+\.\s+/.test(lines[cursor])) {
							items.push(lines[cursor].replace(/^\s*\d+\.\s+/, ''))
							cursor += 1
						}
						html.push(`<ol>${items.map((item) => `<li>${inline(item)}</li>`).join('')}</ol>`)
						continue
					}

					if (/^\s*>/.test(line)) {
						const quotes = []
						while (cursor < lines.length && /^\s*>/.test(lines[cursor])) {
							quotes.push(lines[cursor].replace(/^\s*>\s?/, ''))
							cursor += 1
						}
						html.push(`<blockquote>${quotes.map(inline).join('<br>')}</blockquote>`)
						continue
					}

					const paragraph = [line]
					cursor += 1
					while (cursor < lines.length && lines[cursor].trim() && !/^(#{1,4})\s+/.test(lines[cursor])) {
						if (/^\s*[-*]\s+/.test(lines[cursor]) || /^\s*\d+\.\s+/.test(lines[cursor])) break
						if (lines[cursor].startsWith('```')) break
						if (lines[cursor].includes('|') && lines[cursor + 1] && isTableSeparator(lines[cursor + 1])) break
						paragraph.push(lines[cursor])
						cursor += 1
					}
					html.push(`<p>${inline(paragraph.join(' '))}</p>`)
				}

				return html.join('\n')
			}

			const loadDocument = async () => {
				if (!isAllowedPath(docPath)) {
					container.innerHTML = '<p class="error">Путь к документу не разрешен.</p>'
					return
				}

				const response = await fetch(docPath)
				if (!response.ok) {
					container.innerHTML = '<p class="error">Документ не найден.</p>'
					return
				}

				const source = await response.text()
				container.innerHTML = renderMarkdown(source)
				document.title = `${container.querySelector('h1')?.textContent || 'Документация Chatis'}`
			}

			loadDocument().catch((error) => {
				container.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`
			})
		</script>
	</body>
</html>
